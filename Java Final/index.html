<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Blackjack</title>
</head>

<body>
    <div class="contenedor" id="formularioSesion">
        <h2>Inicia sesion o registrate</h2>
        <form id="formLogin">
            <label for="nombreJugador">Ingresa tu nombre:</label>
            <input type="text" id="nombreJugador" placeholder="Tu nombre" required />
            <label for="saldoJugador">Ingresa tu saldo inicial:</label>
            <input type="number" id="saldoJugador" placeholder="Saldo inicial" required min="1" />
            <button type="submit" id="iniciarSesion">Iniciar sesion / Registrarse</button>
        </form>
    </div>

    <div class="contenedor" id="zonaJuego" style="display: none;">
        <header class="centrado">
            <h1>Juego de BlackJack!</h1>
        </header>

        <div class="jugador">
            <h3>Jugador: <span id="jugadorPuntos">0</span></h3>
            <div id="jugadorCartas"></div>
        </div>

        <div class="computadora">
            <h3>Maquina: <span id="maquinaPuntos">0</span></h3>
            <div id="computadoraCartas"></div>
        </div>

        <div class="controles">
            <button id="btnPedir" disabled>Pedir Carta</button>
            <button id="btnDetener" disabled>Detener</button>
        </div>

        <div id="mensajeSaldo">
            <h3 id="saldoJugadorDisplay">Saldo: €0</h3>
        </div>
    </div>

    <div id="resultado" class="contenedor" style="display: none;">
        <h2 id="mensajeResultado"></h2>
        <button id="btnNuevoJuego">Nuevo Juego</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
