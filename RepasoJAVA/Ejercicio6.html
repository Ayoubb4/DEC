<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Equipos de Fútbol</title>
</head>
<body>
    <h1>Gestión de Equipos de Fútbol</h1>

    <form action="">
        <label for="nombreJugador">Nombre Jugador</label>
        <input type="text" id="nombreJugador" required><br>

        <label for="posicion">Posición del Jugador</label>
        <select id="posicion" required>
            <option value="delantero">Delantero</option>
            <option value="mediocampista">Mediocampista</option>
            <option value="defensa">Defensa</option>
            <option value="portero">Portero</option>
        </select><br>

        <label for="numGoles">Número de Goles</label>
        <input type="number" id="numGoles" required><br>

        <label for="equipo">Equipo del Jugador</label>
        <select id="equipo" required>
            <option value="madrid">Real Madrid</option>
            <option value="calatayud">Real Calatayud</option>
            <option value="betis">Real Betis Balonpie</option>
            <option value="malaga">Malaga FC</option>
        </select><br>

        <button type="button" onclick="crearJugador()">Agregar Jugador</button>
        <button type="button" onclick="escribirEquipos()">Mostrar Todos los Jugadores</button>
    </form>

    <div id="div1"></div>

    <script src="Ejercicio6.js"></script> <!-- Aquí el archivo js se carga al final -->
</body>
</html>
